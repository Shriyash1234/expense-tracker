services:
  - type: web
    name: expense-tracker-api
    env: node
    rootDir: backend
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    autoDeploy: true
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB_NAME
        value: expense-tracker
      - key: CORS_ORIGIN
        sync: false
